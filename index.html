<!DOCTYPE html>
<html>
<head>
    <title>Student & Attendance Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        .container {
            width: 85%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: #333;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 180px;
        }

        button {
            padding: 6px 12px;
            margin: 3px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            color: white;
        }

        .add-btn {
            background-color: green;
        }

        .present-btn {
            background-color: blue;
        }

        .absent-btn {
            background-color: orange;
        }

        .delete-btn {
            background-color: red;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background-color: green;
            color: white;
        }

        .present {
            color: green;
            font-weight: bold;
        }

        .absent {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Student Attendance Management System</h1>

    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="roll" placeholder="Roll Number">
    <input type="text" id="course" placeholder="Course">
    <button class="add-btn" onclick="addStudent()">Add Student</button>

    <table id="studentTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll No</th>
                <th>Course</th>
                <th>Attendance</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>

<script>
function addStudent() {
    let name = document.getElementById("name").value;
    let roll = document.getElementById("roll").value;
    let course = document.getElementById("course").value;

    if (name === "" || roll === "" || course === "") {
        alert("Please fill all fields!");
        return;
    }

    let table = document.getElementById("studentTable").getElementsByTagName("tbody")[0];
    let newRow = table.insertRow();

    newRow.insertCell(0).innerHTML = name;
    newRow.insertCell(1).innerHTML = roll;
    newRow.insertCell(2).innerHTML = course;
    newRow.insertCell(3).innerHTML = "<span>Not Marked</span>";
    newRow.insertCell(4).innerHTML = `
        <button class="present-btn" onclick="markPresent(this)">Present</button>
        <button class="absent-btn" onclick="markAbsent(this)">Absent</button>
        <button class="delete-btn" onclick="deleteStudent(this)">Delete</button>
    `;

    document.getElementById("name").value = "";
    document.getElementById("roll").value = "";
    document.getElementById("course").value = "";
}

function markPresent(btn) {
    let row = btn.parentNode.parentNode;
    let attendanceCell = row.cells[3];
    attendanceCell.innerHTML = "<span class='present'>Present</span>";
}

function markAbsent(btn) {
    let row = btn.parentNode.parentNode;
    let attendanceCell = row.cells[3];
    attendanceCell.innerHTML = "<span class='absent'>Absent</span>";
}

function deleteStudent(btn) {
    let row = btn.parentNode.parentNode;
    row.parentNode.removeChild(row);
}
</script>

</body>
</html>
