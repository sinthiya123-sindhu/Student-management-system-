<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        .container {
            width: 80%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }

        button {
            padding: 8px 15px;
            margin: 5px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #45a049;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        .delete-btn {
            background-color: red;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Student Management System</h1>

        <input type="text" id="name" placeholder="Student Name">
        <input type="text" id="roll" placeholder="Roll Number">
        <input type="text" id="course" placeholder="Course">
        <button onclick="addStudent()">Add Student</button>

        <table id="studentTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Course</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

<script>
    function addStudent() {
        let name = document.getElementById("name").value;
        let roll = document.getElementById("roll").value;
        let course = document.getElementById("course").value;

        if(name === "" || roll === "" || course === "") {
            alert("Please fill all fields");
            return;
        }

        let table = document.getElementById("studentTable").getElementsByTagName("tbody")[0];
        let newRow = table.insertRow();

        newRow.insertCell(0).innerHTML = name;
        newRow.insertCell(1).innerHTML = roll;
        newRow.insertCell(2).innerHTML = course;
        newRow.insertCell(3).innerHTML = 
            '<button class="delete-btn" onclick="deleteStudent(this)">Delete</button>';

        document.getElementById("name").value = "";
        document.getElementById("roll").value = "";
        document.getElementById("course").value = "";
    }

    function deleteStudent(btn) {
        let row = btn.parentNode.parentNode;
        row.parentNode.removeChild(row);
    }
</script>

</body>
  </html>
